<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Words Tool</title>

<style>
:root {
  --bg:#060c18; --card:#0f1a2e; --surface:#0a1324;
  --border:#1e2d45; --accent:#38bdf8; --text:#e2e8f0;
  --muted:#64748b; --gold:#facc15; --green:#34d399; --red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui;height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{display:flex;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.status{padding:5px 12px;border-radius:20px;font-size:12px}
.s-online{background:#064e3b;color:#34d399}
.s-offline{background:#450a0a;color:#f87171}
.s-syncing{background:#422006;color:#facc15}
.s-pending{background:#422006;color:#facc15}

/* LAYOUT */
.container{display:grid;grid-template-columns:300px 1fr;flex:1;overflow:hidden}
.sidebar{padding:12px;background:var(--surface);display:flex;flex-direction:column;gap:8px}
textarea,input{width:100%;padding:8px;background:var(--card);color:#fff;border:1px solid var(--border)}

button{padding:8px;cursor:pointer;border-radius:6px;border:none}

.main{display:flex;flex-direction:column}
.toolbar{display:flex;gap:8px;padding:10px;border-bottom:1px solid var(--border)}
.toolbar input{flex:1}

.content{overflow:auto;padding:12px}

/* TABLE */
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:8px;text-align:left;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top}

.col-word{width:160px}
.col-actions{width:110px}

.word{color:var(--accent);font-weight:bold;word-break:break-word}

.actions{display:flex;gap:8px}
.actions span{cursor:pointer;flex-shrink:0}

/* TEXT */
.def{word-break:break-word}
.ex{color:var(--gold);font-size:12px;margin-top:3px}

.view-btn{padding:6px 10px;border:1px solid var(--border);background:var(--card);color:#ccc}
.view-btn.active{background:var(--accent);color:#000}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.card{background:var(--card);padding:10px;border:1px solid var(--border);border-radius:8px}

</style>

</head>

<body>

<div class="header">
  <div>Words Tool</div>
  <div>
    <span id="status" class="status s-syncing">Starting...</span>
    <span id="count"></span>
  </div>
</div>

<div class="container">

<div class="sidebar">
<textarea id="input" placeholder="word per line"></textarea>
<textarea id="chat" placeholder="definition | example"></textarea>
<button onclick="save()">Save</button>
<button onclick="clearInputs()">Clear</button>
</div>

<div class="main">
<div class="toolbar">
<input id="search" placeholder="Search..." oninput="render()">
<button class="view-btn active" onclick="setView('table')" id="bt">Table</button>
<button class="view-btn" onclick="setView('cards')" id="bc">Cards</button>
</div>
<div id="out" class="content"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyOot_kvXfvlkXm2hrBheBiIwxBC9or72iw9nhzo-6T5So2vGObnqrcCdUDYBVoWFJY/exec";

/* STATE */
let data={};
let queue=JSON.parse(localStorage.getItem("queue")||"[]");
let view="table";

/* STATUS */
const map={
ONLINE:["s-online","Synced"],
OFFLINE:["s-offline","Offline"],
SYNCING:["s-syncing","Syncing"],
PENDING:["s-pending","Pending"]
};
function setStatus(s){
let el=status;
el.className="status "+map[s][0];
el.innerText=map[s][1];
}

/* VOICE */
let voices=[];
speechSynthesis.onvoiceschanged=()=>voices=speechSynthesis.getVoices();
function speak(w){
let u=new SpeechSynthesisUtterance(w);
u.lang="en-US";
let v=voices.find(v=>v.lang==="en-US");
if(v)u.voice=v;
speechSynthesis.speak(u);
}

/* HELPERS */
function defKey(d,e){
return (d||"").toLowerCase().trim()+"|||"+(e||"").toLowerCase().trim();
}
function mergeEntry(w,d,e){
w=w.toLowerCase().trim();
if(!data[w])data[w]=[];
let k=defKey(d,e);
if(!data[w].some(x=>defKey(x.def,x.ex)===k)){
data[w].push({def:d||"",ex:e||""});
}
}

/* PARSE */
function parse(t){
if(!t)return{def:"",ex:""};
let p=t.split("|");
return{def:p[0].trim(),ex:(p[1]||"").trim()};
}

/* SAVE */
async function save(){
let words=input.value.split("\n");
let defs=chat.value.split("\n");
let items=[];

words.forEach((w,i)=>{
let p=parse(defs[i]||"");
let wl=w.toLowerCase();
if(!wl)return;

let k=defKey(p.def,p.ex);
if(!data[wl]||!data[wl].some(d=>defKey(d.def,d.ex)===k)){
mergeEntry(wl,p.def,p.ex);
items.push({word:wl,definition:p.def,example:p.ex});
}
});

localStorage.setItem("words",JSON.stringify(data));
render();

try{
await fetch(API,{method:"POST",body:JSON.stringify({action:"batch",items})});
setStatus("ONLINE");
}catch{
items.forEach(i=>queue.push(i));
localStorage.setItem("queue",JSON.stringify(queue));
setStatus("PENDING");
}
}

/* DELETE */
async function del(w){
let defs=data[w]||[];
delete data[w];
localStorage.setItem("words",JSON.stringify(data));
render();

for(let d of defs){
try{
await fetch(API,{method:"POST",body:JSON.stringify({action:"delete",word:w,definition:d.def,example:d.ex})});
}catch{
queue.push({action:"delete",word:w,definition:d.def,example:d.ex});
}
}
}

/* EDIT */
async function editWord(w){
let d=data[w][0];
let n=prompt("Edit",d.def);
if(!n)return;

let old=d.def;
d.def=n;

try{
await fetch(API,{method:"POST",body:JSON.stringify({
action:"update",word:w,oldDef:old,oldEx:d.ex,newDef:n,newEx:d.ex
})});
}catch{
queue.push({action:"update",word:w,oldDef:old,newDef:n});
}
render();
}

/* SYNC */
async function syncQueue(){
if(!queue.length)return;
setStatus("SYNCING");
let failed=[];
for(let q of queue){
try{
let body=q.action?q:{action:"batch",items:[q]};
await fetch(API,{method:"POST",body:JSON.stringify(body)});
}catch{failed.push(q)}
}
queue=failed;
localStorage.setItem("queue",JSON.stringify(queue));
setStatus(queue.length?"PENDING":"ONLINE");
}

/* LOAD */
async function load(){
try{data=JSON.parse(localStorage.getItem("words")||"{}")}catch{data={}}
render();
setStatus("SYNCING");

try{
let r=await fetch(API+"?action=getAll");
let j=await r.json();

j.data.forEach(i=>mergeEntry(i.word,i.definition,i.example));

localStorage.setItem("words",JSON.stringify(data));
setStatus(queue.length?"PENDING":"ONLINE");
}catch{
setStatus("OFFLINE");
}
render();
}

/* VIEW */
function setView(v){
view=v;
bt.classList.toggle("active",v==="table");
bc.classList.toggle("active",v==="cards");
render();
}

/* RENDER */
function render(){
let s=search.value.toLowerCase();

/* 🔥 FIX: newest first */
let list=Object.keys(data)
.filter(w=>w.includes(s))
.sort((a,b)=>b.localeCompare(a));

count.innerText=list.length;

if(view==="table"){
out.innerHTML=`
<table>
<thead>
<tr>
<th class="col-word">Word</th>
<th>Details</th>
<th class="col-actions">Actions</th>
</tr>
</thead>
<tbody>
${list.map(w=>{
let defs=data[w].map(d=>`
<div class="def">${d.def}</div>
${d.ex?`<div class="ex">${d.ex}</div>`:""}
`).join("");

return`
<tr>
<td class="word">${w}</td>
<td>${defs}</td>
<td>
<div class="actions">
<span onclick="speak('${w}')">🔊</span>
<span onclick="editWord('${w}')">✏️</span>
<span onclick="del('${w}')">❌</span>
</div>
</td>
</tr>`;
}).join("")}
</tbody>
</table>`;
}else{
out.innerHTML=`<div class="cards">
${list.map(w=>`
<div class="card">
<div class="word">${w}</div>
${data[w].map(d=>`
<div class="def">${d.def}</div>
${d.ex?`<div class="ex">${d.ex}</div>`:""}
`).join("")}
<div class="actions">
<span onclick="speak('${w}')">🔊</span>
<span onclick="editWord('${w}')">✏️</span>
<span onclick="del('${w}')">❌</span>
</div>
</div>`).join("")}
</div>`;
}
}

/* INIT */
setInterval(syncQueue,6000);
window.addEventListener("online",syncQueue);

function clearInputs(){input.value="";chat.value="";}

load();
</script>

</body>
</html>

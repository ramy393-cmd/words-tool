<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Words Tool</title>

<style>
body{background:#060c18;color:#e2e8f0;font-family:system-ui;margin:0}
.header{display:flex;justify-content:space-between;padding:12px;background:#0a1324}
.status{padding:4px 10px;border-radius:20px;font-size:12px}
.online{background:#064e3b;color:#34d399}
.offline{background:#450a0a;color:#f87171}
.syncing{background:#422006;color:#facc15}
.local{background:#422006;color:#facc15}

.container{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 50px)}
.sidebar{padding:10px;background:#0a1324}
textarea,input{width:100%;margin-bottom:8px;padding:8px;background:#0f1a2e;color:#fff;border:1px solid #1e2d45}
button{padding:8px;width:100%;margin-bottom:5px}

.actions{display:flex;gap:8px;align-items:center}
.word{white-space:nowrap;color:#38bdf8}

table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #1e2d45}
</style>

</head>

<body>

<div class="header">
<div>Words Tool</div>
<div>
<span id="status" class="status syncing">Starting...</span>
<span id="count"></span>
</div>
</div>

<div class="container">

<div class="sidebar">
<textarea id="input"></textarea>
<textarea id="chat"></textarea>
<button onclick="save()">Save</button>
</div>

<div>
<input id="search" oninput="render()">
<div id="out"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyOot_kvXfvlkXm2hrBheBiIwxBC9or72iw9nhzo-6T5So2vGObnqrcCdUDYBVoWFJY/exec"

let data={}
let queue=JSON.parse(localStorage.getItem("queue")||"[]")

function setStatus(c,t){
status.className="status "+c
status.innerText=t
}

/* US VOICE */
let voices=[]
speechSynthesis.onvoiceschanged=()=>voices=speechSynthesis.getVoices()

function speak(w){
let u=new SpeechSynthesisUtterance(w)
u.lang="en-US"
let v=voices.find(v=>v.lang==="en-US")
if(v)u.voice=v
speechSynthesis.speak(u)
}

/* PARSE */
function parse(t){
if(!t)return{def:"",ex:""}
let a=t.split("|")
return{def:a[0].trim(),ex:(a[1]||"").trim()}
}

/* SAVE */
async function save(){
setStatus("syncing","Syncing...")
let words=input.value.split("\n")
let lines=chat.value.split("\n")
let items=[]

words.forEach((w,i)=>{
w=w.toLowerCase()
let p=parse(lines[i]||"")
if(!data[w])data[w]=[]

if(!data[w].some(d=>d.def===p.def)){
data[w].push(p)
items.push({word:w,definition:p.def,example:p.ex})
}
})

try{
await fetch(API,{method:"POST",body:JSON.stringify({action:"batch",items})})
setStatus("online","Synced")
}catch{
queue.push(...items)
localStorage.setItem("queue",JSON.stringify(queue))
setStatus("local","Saved locally")
}

localStorage.setItem("words",JSON.stringify(data))
render()
}

/* DELETE */
async function del(w){
for(let d of data[w]){
await fetch(API,{
method:"POST",
body:JSON.stringify({action:"delete",word:w,definition:d.def,example:d.ex})
})
}
delete data[w]
localStorage.setItem("words",JSON.stringify(data))
render()
}

/* UPDATE */
async function editWord(w){
let d=data[w][0]
let n=prompt("Edit",d.def)
if(n){
await fetch(API,{
method:"POST",
body:JSON.stringify({action:"update",word:w,oldDef:d.def,oldEx:d.ex,newDef:n,newEx:d.ex})
})
d.def=n
render()
}
}

/* SYNC */
async function syncQueue(){
if(!queue.length)return
setStatus("syncing","Syncing...")

let newQ=[]
for(let i of queue){
try{
await fetch(API,{method:"POST",body:JSON.stringify({action:"batch",items:[i]})})
}catch{
newQ.push(i)
}
}
queue=newQ
localStorage.setItem("queue",JSON.stringify(queue))

setStatus(queue.length?"local":"online",queue.length?"Pending":"Synced")
}

/* LOAD */
async function load(){
try{
let r=await fetch(API+"?action=getAll")
let j=await r.json()

j.data.forEach(i=>{
if(!data[i.word])data[i.word]=[]
data[i.word].push({def:i.definition,ex:i.example})
})

setStatus("online","Synced")
}catch{
setStatus("offline","Offline")
}

render()
syncQueue()
}

/* RENDER */
function render(){
let s=search.value.toLowerCase()
let list=Object.keys(data).filter(w=>w.includes(s))
count.innerText=list.length

out.innerHTML="<table>"+list.map(w=>`
<tr>
<td class="word">${w}</td>
<td>${data[w].map(d=>d.def).join("<br>")}</td>
<td>
<div class="actions">
<span onclick="speak('${w}')">🔊</span>
<span onclick="editWord('${w}')">✏️</span>
<span onclick="del('${w}')">❌</span>
</div>
</td>
</tr>`).join("")+"</table>"
}

setInterval(syncQueue,5000)
window.addEventListener("online",syncQueue)

load()
</script>

</body>
</html>

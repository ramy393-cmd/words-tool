<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Words Tool</title>

<style>
:root{
--bg:#060c18;--card:#0f1a2e;--border:#1e2d45;
--accent:#38bdf8;--text:#e2e8f0;--gold:#facc15;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui}

.header{
display:flex;justify-content:space-between;
padding:14px 20px;border-bottom:1px solid var(--border);
background:#0a1324
}
.logo{color:var(--accent);font-weight:700}

.status{padding:4px 10px;border-radius:999px;font-size:12px}
.online{background:#064e3b;color:#34d399}
.offline{background:#450a0a;color:#f87171}
.syncing{background:#422006;color:#facc15}
.local{background:#422006;color:#facc15}

.container{
display:grid;
grid-template-columns:300px 1fr;
height:calc(100vh - 50px)
}

.sidebar{
padding:16px;background:#0a1324;
border-right:1px solid var(--border);
display:flex;flex-direction:column;gap:10px
}

textarea,input{
width:100%;padding:10px;border-radius:8px;
border:1px solid var(--border);
background:var(--card);color:white
}

button{
padding:10px;border:none;border-radius:8px;
cursor:pointer;font-weight:600
}

.btn-primary{background:var(--accent);color:black}
.btn-secondary{background:linear-gradient(135deg,#0ea5e9,#38bdf8)}
.btn-danger{border:1px solid var(--border)}

.main{display:flex;flex-direction:column}

.toolbar{
display:flex;gap:10px;padding:12px;
border-bottom:1px solid var(--border)
}

.toolbar input{flex:1}

.view-btn{
padding:8px;background:var(--card);
border:1px solid var(--border);
cursor:pointer
}
.view-btn.active{background:var(--accent);color:black}

.content{overflow:auto;padding:14px}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid var(--border)}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:12px
}

.card{
background:var(--card);
padding:12px;border-radius:10px;
border:1px solid var(--border)
}

.word{
color:var(--accent);
font-weight:700;
direction:ltr;
unicode-bidi:plaintext;
}

.actions{
display:flex;
gap:10px;
align-items:center;
white-space:nowrap;
}

td{
word-break:normal;
overflow-wrap:break-word;
white-space:normal;
}

.clamp{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden
}

.link{color:var(--accent);cursor:pointer;font-size:12px}
.example{color:var(--gold);font-style:italic;margin-top:4px}

.more{display:none}
.more.open{display:block}
</style>

</head>

<body>

<div class="header">
<div class="logo">Words Tool</div>
<div>
<span id="status" class="status syncing">Starting...</span>
Words: <span id="count">0</span>
</div>
</div>

<div class="container">

<div class="sidebar">
<textarea id="input" placeholder="Words"></textarea>
<textarea id="chat" placeholder="definition | example"></textarea>
<button class="btn-primary" onclick="save()">Save</button>
<button class="btn-secondary" onclick="generate()">AI Prompt</button>
<button class="btn-danger" onclick="clearAll()">Clear</button>
</div>

<div class="main">
<div class="toolbar">
<input id="search" placeholder="Search..." oninput="render()">
<button class="view-btn active" id="bt" onclick="setView('table')">Table</button>
<button class="view-btn" id="bc" onclick="setView('cards')">Cards</button>
</div>
<div class="content" id="out"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyWdSegGJbD4UWlbhMQnS_Uv8FU9bOK7phhEeEVrn5ZOUVh_H_SXtY0uGwnIgVx6R7f/exec"

let data={}
let queue=JSON.parse(localStorage.getItem("queue")||"[]")
let view="table"

/* STATUS */
function setStatus(c,t){
status.className="status "+c
status.innerText=t
}

/* SAFE */
function safeText(t){
return String(t||"").replace(/</g,"&lt;").replace(/>/g,"&gt;")
}

/* SPEAK */
function speak(w){
speechSynthesis.speak(new SpeechSynthesisUtterance(w))
}

/* PARSE */
function parse(t){
if(!t)return{def:"",ex:""}
if(t.includes("|")){
let a=t.split("|")
return{def:a[0].trim(),ex:a.slice(1).join("|").trim()}
}
return{def:t.trim(),ex:""}
}

/* SAVE */
async function save(){
setStatus("syncing","Syncing...")

let words=input.value.split("\n").filter(Boolean)
let lines=chat.value.split("\n")

for(let i=0;i<words.length;i++){
let word=words[i].toLowerCase()
let p=parse(lines[i]||"")

if(!data[word])data[word]=[]

if(!data[word].some(d=>d.def===p.def&&d.ex===p.ex)){
data[word].push(p)

let item={action:"save",word,definition:p.def,example:p.ex}

try{
await fetch(API,{method:"POST",body:JSON.stringify(item)})
setStatus("online","Synced")
}catch{
queue.push(item)
localStorage.setItem("queue",JSON.stringify(queue))
setStatus("local","Saved locally")
}
}
}

localStorage.setItem("words",JSON.stringify(data))
render()
}

/* SYNC QUEUE */
async function syncQueue(){
if(!queue.length)return

setStatus("syncing","Syncing...")

let newQ=[]

for(let item of queue){
try{
await fetch(API,{method:"POST",body:JSON.stringify(item)})
}catch{
newQ.push(item)
}
}

queue=newQ
localStorage.setItem("queue",JSON.stringify(queue))

if(queue.length===0){
setStatus("online","Synced")
}else{
setStatus("local","Pending sync")
}
}

/* LOAD */
async function load(){
let saved=localStorage.getItem("words")
if(saved)data=JSON.parse(saved)

try{
let r=await fetch(API+"?action=getAll")
let j=await r.json()

j.data.forEach(i=>{
let w=i.word.toLowerCase()
if(!data[w])data[w]=[]
let obj={def:i.definition||"",ex:i.example||""}

if(!data[w].some(d=>d.def===obj.def&&d.ex===obj.ex)){
data[w].push(obj)
}
})

setStatus("online","Synced")

}catch{
setStatus("local","Offline data")
}

render()
syncQueue()
}

/* RENDER */
function render(){
let s=search.value.toLowerCase()

let list=Object.keys(data).filter(w=>{
return w.includes(s)||data[w].some(d=>d.def.toLowerCase().includes(s))
}).reverse()

count.innerText=list.length

out.innerHTML="<table><tr><th>Word</th><th>Details</th><th></th></tr>"+
list.map(w=>`
<tr>
<td class="word">${safeText(w)}</td>
<td>${data[w].map(d=>d.def).join("<br>")}</td>
<td>
<div class="actions">
<span onclick="speak('${safeText(w)}')">🔊</span>
<span onclick="editWord('${safeText(w)}')">✏️</span>
<span onclick="del('${safeText(w)}')">❌</span>
</div>
</td>
</tr>`).join("")+"</table>"
}

/* ACTIONS */
function del(w){
delete data[w]
localStorage.setItem("words",JSON.stringify(data))
render()
}

function editWord(w){
let d=data[w][0]
let n=prompt("Edit",d.def)
if(n!==null){
d.def=n
localStorage.setItem("words",JSON.stringify(data))
render()
}
}

function clearAll(){
input.value=""
chat.value=""
}

/* AUTO SYNC */
setInterval(syncQueue,5000)
window.addEventListener("online",syncQueue)
window.addEventListener("offline",()=>setStatus("offline","Offline"))

load()
</script>

</body>
</html>

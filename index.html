<!-- نفس الكود بتاعك 100% مع تعديل fetch فقط -->

<script>
const API="https://script.google.com/macros/s/AKfycbxn6Y2FceyY3tg2v4kOvzI0Ghu5Pi6ulqhXi3Rl7G3LVf50mSjtcIa5ZlUx45RzbfyP/exec";

let data=JSON.parse(localStorage.getItem("words")||"{}");
let queue=JSON.parse(localStorage.getItem("queue")||"[]");
let view="table";

/* STATUS */
function setStatus(t,x){
  let s=document.getElementById("status");
  s.className="status "+t;
  s.innerText=x;
}

/* SAVE */
async function save(){
  setStatus("syncing","Saving...");

  let words=input.value.split("\n").map(x=>x.trim()).filter(Boolean);
  let defs=chat.value.split("\n");

  let items=[];

  words.forEach((w,i)=>{
    let word=w.toLowerCase();
    let parts=(defs[i]||"").split("|");
    let def=parts[0]?.trim()||"";
    let ex=parts[1]?.trim()||"";

    if(!data[word])data[word]=[];

    if(!data[word].some(d=>d.def===def&&d.ex===ex)){
      data[word].push({def,ex});
      items.push({word,definition:def,example:ex});
    }
  });

  localStorage.setItem("words",JSON.stringify(data));
  render();

  if(!items.length){
    setStatus("online","Online");
    return;
  }

  try{
    await fetch(API,{
      method:"POST",
      body:JSON.stringify({
        action:"batch",
        items
      })
    });

    setStatus("online","Online");

  }catch{
    queue.push(...items);
    localStorage.setItem("queue",JSON.stringify(queue));
    setStatus("local","Saved locally");
  }
}

/* LOAD */
async function load(){
  setStatus("syncing","Syncing...");
  try{
    let r=await fetch(API+"?action=getAll",{cache:"no-store"});
    let j=await r.json();

    j.data?.forEach(i=>{
      let w=i.word.toLowerCase();
      if(!data[w])data[w]=[];

      let obj={def:i.definition||"",ex:i.example||""};

      if(!data[w].some(d=>d.def===obj.def&&d.ex===obj.ex)){
        data[w].push(obj);
      }
    });

    setStatus("online","Online");

  }catch{
    setStatus("offline","Offline");
  }

  syncQueue();
  render();
}

/* QUEUE */
async function syncQueue(){
  if(!queue.length)return;

  setStatus("syncing","Syncing...");

  let newQ=[];

  for(let item of queue){
    try{
      await fetch(API,{
        method:"POST",
        body:JSON.stringify({
          action:"batch",
          items:[item]
        })
      });
    }catch{
      newQ.push(item);
    }
  }

  queue=newQ;
  localStorage.setItem("queue",JSON.stringify(queue));

  setStatus("online","Online");
}

/* DELETE */
async function del(word){
  let defs=data[word]||[];
  delete data[word];

  localStorage.setItem("words",JSON.stringify(data));
  render();

  try{
    for(let d of defs){
      await fetch(API,{
        method:"POST",
        body:JSON.stringify({
          action:"delete",
          word,
          definition:d.def
        })
      });
    }
  }catch{}
}

/* EDIT */
async function editWord(word){
  let old=data[word][0].def;
  let n=prompt("Edit",old);
  if(!n)return;

  data[word][0].def=n;
  localStorage.setItem("words",JSON.stringify(data));
  render();

  try{
    await fetch(API,{
      method:"POST",
      body:JSON.stringify({
        action:"update",
        word,
        oldDefinition:old,
        newDefinition:n
      })
    });
  }catch{}
}

/* SPEAK */
function speak(w){
  let u=new SpeechSynthesisUtterance(w);
  u.lang="en-US";
  speechSynthesis.speak(u);
}
</script>

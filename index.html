<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Words Tool</title>

<style>
:root {
  --bg:#060c18; --card:#0f1a2e; --surface:#0a1324;
  --border:#1e2d45; --accent:#38bdf8; --text:#e2e8f0;
  --muted:#64748b; --gold:#facc15; --green:#34d399; --red:#f87171;
}
body{margin:0;background:var(--bg);color:#fff;font-family:sans-serif}
.header{display:flex;justify-content:space-between;padding:10px;background:var(--surface)}
.status{padding:4px 10px;border-radius:20px;font-size:12px}
.s-online{background:#064e3b}
.s-offline{background:#450a0a}
.s-sync{background:#422006}

.container{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 40px)}

.sidebar{padding:10px;background:var(--surface)}
textarea,input{width:100%;margin-bottom:6px;padding:6px;background:#111;color:#fff;border:1px solid #333}

button{width:100%;padding:6px;margin-bottom:5px}

.content{padding:10px;overflow:auto}

table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333}

.word{color:#38bdf8;font-weight:bold}
.actions{display:flex;gap:6px}
.ex{color:var(--gold);font-size:12px}
</style>

</head>

<body>

<div class="header">
<div>Words Tool</div>
<div>
<span id="status" class="status s-sync">Starting...</span>
<span id="count"></span>
</div>
</div>

<div class="container">

<div class="sidebar">
<textarea id="input" placeholder="words"></textarea>
<textarea id="chat" placeholder="definition | example"></textarea>
<button onclick="save()">Save</button>
<button onclick="clearInputs()">Clear</button>
</div>

<div class="content">
<input id="search" placeholder="Search..." oninput="render()">
<div id="out"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyOot_kvXfvlkXm2hrBheBiIwxBC9or72iw9nhzo-6T5So2vGObnqrcCdUDYBVoWFJY/exec";

let data={};
let queue=JSON.parse(localStorage.getItem("queue")||"[]");

/* STATUS */
function setStatus(s){
status.className="status "+(s==="ONLINE"?"s-online":s==="OFFLINE"?"s-offline":"s-sync");
status.innerText=s;
}

/* VOICE */
function speak(w){
let u=new SpeechSynthesisUtterance(w);
u.lang="en-US";
speechSynthesis.speak(u);
}

/* HELPERS */
function key(d,e){return d+"|"+e}

/* SAVE */
async function save(){
let words=input.value.split("\n");
let defs=chat.value.split("\n");
let items=[];

words.forEach((w,i)=>{
if(!w)return;
let d=(defs[i]||"").split("|");
let def=d[0]||"", ex=d[1]||"";

if(!data[w])data[w]=[];
if(!data[w].some(x=>key(x.def,x.ex)===key(def,ex))){
data[w].push({def,ex,createdAt:Date.now()});
items.push({word:w,definition:def,example:ex});
}
});

localStorage.setItem("words",JSON.stringify(data));
render();

try{
await fetch(API,{method:"POST",body:JSON.stringify({action:"batch",items})});
setStatus("ONLINE");
}catch{
queue.push(...items);
localStorage.setItem("queue",JSON.stringify(queue));
setStatus("OFFLINE");
}
}

/* DELETE */
async function del(w){
delete data[w];
localStorage.setItem("words",JSON.stringify(data));
render();

try{
await fetch(API,{method:"POST",body:JSON.stringify({action:"delete",word:w})});
}catch{
queue.push({action:"delete",word:w});
}
}

/* SYNC */
async function sync(){
if(!queue.length)return;
setStatus("SYNCING");

let failed=[];
for(let q of queue){
try{
await fetch(API,{method:"POST",body:JSON.stringify(q)});
}catch{
failed.push(q);
}
}

queue=failed;
localStorage.setItem("queue",JSON.stringify(queue));
setStatus(queue.length?"OFFLINE":"ONLINE");
}

/* LOAD */
async function load(){
try{
data=JSON.parse(localStorage.getItem("words")||"{}");
}catch{data={};}

render();

try{
let r=await fetch(API+"?action=getAll");
let j=await r.json();

j.data.forEach(i=>{
if(!data[i.word])data[i.word]=[];
if(!data[i.word].some(x=>x.def===i.definition)){
data[i.word].push({def:i.definition,ex:i.example,createdAt:Date.now()});
}
});

localStorage.setItem("words",JSON.stringify(data));
setStatus("ONLINE");
}catch{
setStatus("OFFLINE");
}

render();
}

/* RENDER */
function render(){
let s=search.value.toLowerCase();

let list=Object.keys(data)
.filter(w=>w.toLowerCase().includes(s))
.sort((a,b)=>{
let ta=Math.max(...data[a].map(x=>x.createdAt||0));
let tb=Math.max(...data[b].map(x=>x.createdAt||0));
return tb-ta;
});

count.innerText=list.length;

out.innerHTML="<table>"+list.map(w=>{
let defs=data[w].map(d=>`
<div>${d.def}</div>
${d.ex?`<div class="ex">${d.ex}</div>`:""}
`).join("");

return`
<tr>
<td class="word">${w}</td>
<td>${defs}</td>
<td>
<div class="actions">
<span onclick="speak('${w}')">🔊</span>
<span onclick="del('${w}')">❌</span>
</div>
</td>
</tr>`;
}).join("")+"</table>";
}

/* INIT */
setInterval(sync,5000);
window.addEventListener("online",sync);

function clearInputs(){
input.value="";
chat.value="";
}

load();
</script>

</body>
</html>

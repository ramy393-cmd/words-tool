<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.json">

<title>Words Tool 🚀</title>

<style>
body{margin:0;background:#0b1220;color:#fff;font-family:Arial}
h2{color:#38bdf8;margin:10px}

.container{display:flex;gap:10px;padding:10px}
.left{flex:3}
.right{flex:1;background:#1e293b;padding:10px;border-radius:10px}
@media(max-width:768px){.container{flex-direction:column}}

textarea,input{
width:100%;padding:10px;margin:6px 0;
border:none;border-radius:8px;
background:#1e293b;color:#fff
}

button{
width:100%;padding:10px;margin:6px 0;
border:none;border-radius:8px;
background:#38bdf8;color:#000;font-weight:bold
}

.status{
display:flex;align-items:center;gap:6px;
background:#0f172a;padding:8px;border-radius:6px;margin-bottom:10px
}

.dot{width:10px;height:10px;border-radius:50%;background:gray}
.green{background:#22c55e}
.yellow{background:#facc15}
.red{background:#ef4444}

.toggle{display:flex;gap:10px;padding:10px}
.toggle button{flex:1}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #334155;padding:8px}
th{background:#1e293b;color:#38bdf8}

.action-btn{
padding:4px 6px;margin:0 2px;
border-radius:6px;background:#38bdf8;color:#000;cursor:pointer
}

.flashcard{
background:#1e293b;padding:15px;margin:10px;border-radius:12px
}

.flashcard .word{color:#38bdf8;font-weight:bold;font-size:18px}
.flashcard .def{margin-top:10px;font-size:14px}

.flashcard .actions{display:flex;gap:6px;margin-top:10px}
.flashcard .actions button{width:32px;height:32px;padding:0}

@media(max-width:768px){.table-wrap{display:none}}
</style>
</head>

<body>

<h2>Words Tool 🚀</h2>

<div class="container">
<div class="left">
<textarea id="input" placeholder="Words (list or single)"></textarea>
<textarea id="chat" placeholder="Definition / Example"></textarea>
</div>

<div class="right">
<div class="status">
<span id="dot" class="dot"></span>
<span id="statusText">Ready</span>
</div>

<button onclick="generate()">Generate Prompt</button>
<button onclick="save()">Save</button>
<button onclick="clearAll()">Clear</button>
<button id="installBtn" style="display:none">Install App</button>
</div>
</div>

<div class="toggle">
<button onclick="setView('table')">Table</button>
<button onclick="setView('cards')">Cards</button>
</div>

<div style="padding:10px">
<input id="search" placeholder="Search..." oninput="render()">
<div id="out"></div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwQHi9XYwqzFbQHHfqCf8rv2aeCdQ6ejK3w93zdCPJpHl46nl_CrQCRtZ60i0vk-3c/exec";

let data={}
let viewMode=window.innerWidth<768?"cards":"table"
let deferredPrompt;

function updateStatus(msg,type){
statusText.innerText=msg
dot.className="dot"
if(type==="success") dot.classList.add("green")
if(type==="pending") dot.classList.add("yellow")
if(type==="error") dot.classList.add("red")
}

/* LOAD */
async function load(){

// ⚡ fast offline load
if(!navigator.onLine){
let saved = localStorage.getItem("wordsData")
if(saved){
data = JSON.parse(saved)
render()
updateStatus("Offline (fast)","error")
return
}
}

try{
let r=await fetch(API+"?action=getAll")
let j=await r.json()

data={}
j.data.forEach(i=>{
data[i.word.toLowerCase()]={def:i.definition,ex:i.example||""}
})

localStorage.setItem("wordsData", JSON.stringify(data))

render()
updateStatus("Synced","success")
}catch{

let saved = localStorage.getItem("wordsData")
if(saved){
data = JSON.parse(saved)
render()
updateStatus("Offline (cached)","error")
}else{
updateStatus("Offline","error")
}

}
}

/* PARSE */
function parseLine(text){
let def="",ex=""
if(text.includes("--")){
let parts=text.split("--")
def=parts[0].trim()
ex=(parts[1]||"").trim()
}else if(text.includes("|")){
let parts=text.split("|")
def=parts[0].trim()
ex=(parts[1]||"").trim()
}else{
def=text.trim()
}
return {def,ex}
}

/* SAVE */
async function save(){

let words=input.value.split("\n").map(x=>x.trim()).filter(Boolean)
let lines=chat.value.split("\n").map(x=>x.trim()).filter(Boolean)

updateStatus("Saving...","pending")

if(words.length>1 && lines.length && lines.length!==words.length){
updateStatus("Mismatch","error")
return
}

if(words.length>0){

for(let i=0;i<words.length;i++){

let word=words[i].toLowerCase()
let l=lines[i]||""
let parsed=parseLine(l)

// local
data[word]={def:parsed.def,ex:parsed.ex}
localStorage.setItem("wordsData", JSON.stringify(data))

if(!navigator.onLine){
let q=JSON.parse(localStorage.getItem("queue")||"[]")
q.push({word,def:parsed.def,ex:parsed.ex})
localStorage.setItem("queue", JSON.stringify(q))
continue
}

await syncWord(word,parsed.def,parsed.ex)
}

}else{

for(let l of lines){

let word="",def="",ex=""

if(l.includes(":")){
let [w,rest]=l.split(":")
word=w.trim().toLowerCase()
let parsed=parseLine(rest)
def=parsed.def
ex=parsed.ex
}else{
let parts=l.split(" ")
word=parts[0].toLowerCase()
let parsed=parseLine(parts.slice(1).join(" "))
def=parsed.def
ex=parsed.ex
}

data[word]={def,ex}
localStorage.setItem("wordsData", JSON.stringify(data))

if(!navigator.onLine){
let q=JSON.parse(localStorage.getItem("queue")||"[]")
q.push({word,def,ex})
localStorage.setItem("queue", JSON.stringify(q))
continue
}

await syncWord(word,def,ex)
}

}

render()
updateStatus("Saved","success")
}

/* SYNC */
async function syncWord(word,def,ex){
try{
await fetch(API,{
method:"POST",
body:JSON.stringify({
action:data[word]?"update":"save",
word,
definition:def,
example:ex
})
})
}catch{}
}

/* SYNC WHEN ONLINE */
window.addEventListener("online", async ()=>{
let q = JSON.parse(localStorage.getItem("queue")||"[]")

for(let item of q){
await syncWord(item.word,item.def,item.ex)
}

localStorage.removeItem("queue")
updateStatus("Synced","success")
})

/* DELETE */
async function deleteWord(word){
if(!confirm(`Delete "${word}" ?`)) return

delete data[word]
localStorage.setItem("wordsData", JSON.stringify(data))

await fetch(API,{
method:"POST",
body:JSON.stringify({action:"delete",word})
})

render()
}

/* GENERATE */
function generate(){
let words=input.value.trim()
if(!words){updateStatus("No words","error");return}

let prompt=`For each term, return ONLY:
definition -- example

${words}`

navigator.clipboard.writeText(prompt)
window.open("https://chat.openai.com")
}

/* RENDER */
function render(){
let s=search.value.toLowerCase()
let list=Object.keys(data).filter(w=>w.includes(s)||data[w].def.includes(s)).reverse()

let html="",i=list.length

if(viewMode==="table"){
html=`<div class="table-wrap"><table>
<tr><th>#</th><th>Word</th><th>Definition</th><th>Example</th><th>Action</th></tr>`
list.forEach(w=>{
let d=data[w]
html+=`<tr>
<td>${i}</td>
<td>${w}</td>
<td>${d.def}</td>
<td>${d.ex}</td>
<td>
<span class="action-btn" onclick="speak('${w}')">🔊</span>
<span class="action-btn" onclick="editWord('${w}')">✏️</span>
<span class="action-btn" onclick="deleteWord('${w}')">❌</span>
</td>
</tr>`
i--
})
html+="</table></div>"
}else{
list.forEach(w=>{
let d=data[w]
html+=`<div class="flashcard">
<div class="word">${i}. ${w}</div>
<div class="def">
${d.def}<br>
<span style="color:#facc15">${d.ex}</span>
<div class="actions">
<button onclick="speak('${w}')">🔊</button>
<button onclick="editWord('${w}')">✏️</button>
<button onclick="deleteWord('${w}')">❌</button>
</div></div></div>`
i--
})
}

out.innerHTML=html
}

function speak(word){speechSynthesis.speak(new SpeechSynthesisUtterance(word))}
function editWord(word){let i=data[word];chat.value=`${word}: ${i.def} -- ${i.ex}`}
function clearAll(){input.value="";chat.value="";updateStatus("Ready")}
function setView(v){viewMode=v;render()}

/* INSTALL BUTTON */
window.addEventListener("beforeinstallprompt", (e) => {
e.preventDefault();
deferredPrompt = e;
installBtn.style.display="block";
});

installBtn.onclick = async () => {
if(!deferredPrompt) return;
deferredPrompt.prompt();
deferredPrompt=null;
installBtn.style.display="none";
};

load()

/* SERVICE WORKER */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>

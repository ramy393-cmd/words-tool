<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.json">
<title>Words Tool 🚀</title>

<style>
body{margin:0;background:#0b1220;color:#fff;font-family:Arial}
h2{color:#38bdf8;margin:10px}
.container{display:flex;gap:10px;padding:10px}
.left{flex:3}
.right{flex:1;background:#1e293b;padding:10px;border-radius:10px}
@media(max-width:768px){.container{flex-direction:column}}
textarea,input{width:100%;padding:10px;margin:6px 0;border:none;border-radius:8px;background:#1e293b;color:#fff}
button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:8px;background:#38bdf8;color:#000;font-weight:bold}
.status{display:flex;align-items:center;gap:6px;background:#0f172a;padding:8px;border-radius:6px;margin-bottom:10px}
.dot{width:10px;height:10px;border-radius:50%;background:gray}
.green{background:#22c55e}.yellow{background:#facc15}.red{background:#ef4444}
.toggle{display:flex;gap:10px;padding:10px}.toggle button{flex:1}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #334155;padding:8px}
th{background:#1e293b;color:#38bdf8}
.action-btn{padding:4px 6px;margin:0 2px;border-radius:6px;background:#38bdf8;color:#000;cursor:pointer}
.flashcard{background:#1e293b;padding:15px;margin:10px;border-radius:12px}
.flashcard .word{color:#38bdf8;font-weight:bold;font-size:18px}
.flashcard .def{margin-top:10px;font-size:14px}
.flashcard .actions{display:flex;gap:6px;margin-top:10px}
.flashcard .actions button{width:32px;height:32px;padding:0}
@media(max-width:768px){.table-wrap{display:none}}
</style>
</head>

<body>

<h2>Words Tool 🚀</h2>

<div class="container">
<div class="left">
<textarea id="input" placeholder="Words (list or single)"></textarea>
<textarea id="chat" placeholder="definition -- example OR --example only"></textarea>
</div>

<div class="right">
<div class="status">
<span id="dot" class="dot"></span>
<span id="statusText">Ready</span>
</div>

<button onclick="generate()">Generate Prompt</button>
<button onclick="save()">Save</button>
<button onclick="clearAll()">Clear</button>
<button id="installBtn" style="display:none">Install App</button>
</div>
</div>

<div class="toggle">
<button onclick="setView('table')">Table</button>
<button onclick="setView('cards')">Cards</button>
</div>

<div style="padding:10px">
<input id="search" placeholder="Search..." oninput="render()">
<div id="out"></div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwQHi9XYwqzFbQHHfqCf8rv2aeCdQ6ejK3w93zdCPJpHl46nl_CrQCRtZ60i0vk-3c/exec";

let data={}
let viewMode=window.innerWidth<768?"cards":"table"
let deferredPrompt;

function updateStatus(msg,type){
statusText.innerText=msg
dot.className="dot"
if(type==="success") dot.classList.add("green")
if(type==="pending") dot.classList.add("yellow")
if(type==="error") dot.classList.add("red")
}

async function load(){
let saved=localStorage.getItem("wordsData")
if(saved){data=JSON.parse(saved);render();updateStatus("Loaded","success")}
try{
let r=await fetch(API+"?action=getAll")
let j=await r.json()
let newData={}
j.data.forEach(i=>{newData[i.word.toLowerCase()]={def:i.definition,ex:i.example||""}})
if(JSON.stringify(newData)!==JSON.stringify(data)){
data=newData
localStorage.setItem("wordsData",JSON.stringify(data))
render()
}
updateStatus("Synced","success")
}catch{updateStatus("Offline","error")}
}

/* FINAL PARSER */
function parseLine(text){
text=text.trim()
if(text.startsWith("--")){
return {def:"",ex:text.replace(/^--+/,"").trim()}
}
if(text.includes("--")){
let p=text.split("--")
return {def:p[0].trim(),ex:p.slice(1).join("--").trim()}
}
if(text.includes("|")){
let p=text.split("|")
return {def:p[0].trim(),ex:p.slice(1).join("|").trim()}
}
return {def:text,ex:""}
}

async function save(){
let words=input.value.split("\n").map(x=>x.trim()).filter(Boolean)
let lines=chat.value.split("\n").map(x=>x.trim()).filter(Boolean)
updateStatus("Saving...","pending")

if(words.length>1 && lines.length && lines.length!==words.length){
updateStatus("Mismatch","error");return
}

for(let i=0;i<(words.length||lines.length);i++){
let word=(words[i]||lines[i].split(" ")[0]).toLowerCase()
let parsed=parseLine(lines[i]||"")

data[word]={def:parsed.def,ex:parsed.ex}
localStorage.setItem("wordsData",JSON.stringify(data))

if(!navigator.onLine){
let q=JSON.parse(localStorage.getItem("queue")||"[]")
q.push({word,def:parsed.def,ex:parsed.ex})
localStorage.setItem("queue",JSON.stringify(q))
continue
}

await fetch(API,{
method:"POST",
body:JSON.stringify({action:"save",word,definition:parsed.def,example:parsed.ex})
})
}

render()
updateStatus("Saved","success")
}

window.addEventListener("online",async()=>{
let q=JSON.parse(localStorage.getItem("queue")||"[]")
for(let i of q){
await fetch(API,{method:"POST",body:JSON.stringify({action:"save",word:i.word,definition:i.def,example:i.ex})})
}
localStorage.removeItem("queue")
updateStatus("Synced","success")
})

async function deleteWord(word){
if(!confirm("Delete?"))return
delete data[word]
localStorage.setItem("wordsData",JSON.stringify(data))
await fetch(API,{method:"POST",body:JSON.stringify({action:"delete",word})})
render()
}

function generate(){
let w=input.value.trim()
if(!w){updateStatus("No words","error");return}
navigator.clipboard.writeText(`For each term return:\ndefinition -- example\n\n${w}`)
window.open("https://chat.openai.com")
}

function render(){
let s=search.value.toLowerCase()
let list=Object.keys(data).filter(w=>w.includes(s)||data[w].def.includes(s)).reverse()
let html="",i=list.length

if(viewMode==="table"){
html=`<div class="table-wrap"><table><tr><th>#</th><th>Word</th><th>Definition</th><th>Example</th><th>Action</th></tr>`
list.forEach(w=>{
let d=data[w]
html+=`<tr><td>${i}</td><td>${w}</td><td>${d.def}</td><td>${d.ex}</td>
<td><span class="action-btn" onclick="speak('${w}')">🔊</span>
<span class="action-btn" onclick="editWord('${w}')">✏️</span>
<span class="action-btn" onclick="deleteWord('${w}')">❌</span></td></tr>`
i--
})
html+="</table></div>"
}else{
list.forEach(w=>{
let d=data[w]
html+=`<div class="flashcard"><div class="word">${i}. ${w}</div>
<div class="def">${d.def}<br><span style="color:#facc15">${d.ex}</span>
<div class="actions">
<button onclick="speak('${w}')">🔊</button>
<button onclick="editWord('${w}')">✏️</button>
<button onclick="deleteWord('${w}')">❌</button>
</div></div></div>`
i--
})
}
out.innerHTML=html
}

function speak(w){speechSynthesis.speak(new SpeechSynthesisUtterance(w))}
function editWord(w){let i=data[w];chat.value=`${w}: ${i.def} -- ${i.ex}`}
function clearAll(){input.value="";chat.value="";updateStatus("Ready")}
function setView(v){viewMode=v;render()}

window.addEventListener("beforeinstallprompt",e=>{
e.preventDefault();deferredPrompt=e;installBtn.style.display="block"
})
installBtn.onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();installBtn.style.display="none"}

load()
if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js")}
</script>

</body>
</html>

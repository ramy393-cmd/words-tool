```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Words Tool</title>

<style>
:root{
--bg:#060c18;--card:#0f1a2e;--border:#1e2d45;
--accent:#38bdf8;--text:#e2e8f0;--muted:#64748b;--gold:#facc15;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);background:#0a1324}
.logo{color:var(--accent);font-weight:700}
.header-right{display:flex;align-items:center;gap:10px}
.status{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.online{background:#064e3b;color:#34d399}
.offline{background:#450a0a;color:#f87171}
.syncing{background:#422006;color:#facc15}
.local{background:#422006;color:#facc15}
.container{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 50px)}
@media(max-width:900px){.container{grid-template-columns:1fr}}
.sidebar{padding:16px;background:#0a1324;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
textarea,input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:white}
button{padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:600}
.btn-primary{background:var(--accent);color:black}
.btn-secondary{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#000}
.btn-danger{border:1px solid var(--border);color:var(--muted)}
.main{display:flex;flex-direction:column}
.toolbar{display:flex;gap:10px;padding:12px;border-bottom:1px solid var(--border);background:#0a1324;flex-wrap:wrap}
.toolbar input{flex:1}
.view-btn{padding:8px 12px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer}
.view-btn.active{background:var(--accent);color:black}
.content{overflow:auto;padding:14px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.cards{grid-template-columns:1fr}}
.card{background:var(--card);padding:12px;border-radius:10px;border:1px solid var(--border)}
.word{color:var(--accent);font-weight:700}
.def{line-height:1.6}
.clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.link{color:var(--accent);font-size:12px;cursor:pointer}
.example{color:var(--gold);font-style:italic;margin-top:4px}
.more{display:none}
.more.open{display:block}
.actions{display:flex;gap:10px}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Words Tool</div>
  <div class="header-right">
    <div id="status" class="status syncing">Starting...</div>
    <div>Words: <span id="count">0</span></div>
  </div>
</div>

<div class="container">

  <div class="sidebar">
    <textarea id="input" placeholder="Words"></textarea>
    <textarea id="chat" placeholder="definition | example"></textarea>
    <button class="btn-primary" onclick="save()">Save</button>
    <button class="btn-secondary" onclick="generate()">AI Prompt</button>
    <button class="btn-danger" onclick="clearAll()">Clear</button>
  </div>

  <div class="main">
    <div class="toolbar">
      <input id="search" placeholder="Search...">
      <button class="view-btn active" id="bt" onclick="setView('table')">Table</button>
      <button class="view-btn" id="bc" onclick="setView('cards')">Cards</button>
    </div>
    <div class="content" id="out"></div>
  </div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbxn6Y2FceyY3tg2v4kOvzI0Ghu5Pi6ulqhXi3Rl7G3LVf50mSjtcIa5ZlUx45RzbfyP/exec"

let data={}
let queue=JSON.parse(localStorage.getItem("queue")||"[]")
let view="table"
let retryTimer=null
let chatTab=null

function setStatus(t,x){
  let s=document.getElementById("status")
  s.className="status "+t
  s.innerText=x
}

/* PROMPT */
function buildPrompt(){
  let words=input.value.trim()
  if(!words) return "Give definitions and examples"
  return `For each word return EXACTLY:
definition | example

${words}`
}
async function generate(){
  let p=buildPrompt()
  try{await navigator.clipboard.writeText(p)}catch{}
  if(!chatTab||chatTab.closed){
    chatTab=window.open("https://chat.openai.com","_blank")
  }else chatTab.focus()
}

/* PARSE */
function parse(t){
  if(!t)return{def:"",ex:""}
  if(t.includes("|")){
    let a=t.split("|")
    return{def:a[0].trim(),ex:a.slice(1).join("|").trim()}
  }
  if(t.includes("--")){
    let a=t.split("--")
    return{def:a[0].trim(),ex:a.slice(1).join("--").trim()}
  }
  return{def:t.trim(),ex:""}
}

/* SAVE (BATCH) */
async function save(){
  setStatus("syncing","Syncing...")

  let w=input.value.split("\n").map(x=>x.trim()).filter(Boolean)
  let l=chat.value.split("\n")

  let items=[]

  for(let i=0;i<w.length;i++){
    let word=w[i].toLowerCase()
    let p=parse(l[i]||"")

    if(!data[word])data[word]=[]

    if(!data[word].some(d=>d.def===p.def&&d.ex===p.ex)){
      data[word].push(p)
      items.push({word,definition:p.def,example:p.ex})
    }
  }

  if(items.length){
    try{
      let r=await fetch(API,{
        method:"POST",
        body:JSON.stringify({action:"batch",items})
      })
      let j=await r.json()
      if(j.error) throw new Error(j.error)

      setStatus("online","Online")
    }catch(e){
      // fallback
      items.forEach(it=>{
        if(!queue.some(q=>q.word===it.word && q.definition===it.definition)){
          queue.push(it)
        }
      })
      localStorage.setItem("queue",JSON.stringify(queue))
      setStatus("local","Saved locally")
    }
  }

  localStorage.setItem("words",JSON.stringify(data))
  render()
}

/* LOAD */
async function load(){
  let saved=localStorage.getItem("words")
  if(saved)data=JSON.parse(saved)

  setStatus("syncing","Syncing...")

  try{
    let r=await fetch(API,{cache:"no-store"})
    let j=await r.json()

    j.data?.forEach(i=>{
      let w=i.word.toLowerCase()
      if(!data[w])data[w]=[]
      let obj={def:i.definition||"",ex:i.example||""}
      if(!data[w].some(d=>d.def===obj.def&&d.ex===obj.ex)){
        data[w].push(obj)
      }
    })

    setStatus("online","Online")

  }catch{
    setStatus("local","API Error")
    startRetry()
  }

  syncQueue()
  render()
}

/* SYNC */
async function syncQueue(){
  if(!queue.length)return
  setStatus("syncing","Syncing...")

  try{
    let r=await fetch(API,{
      method:"POST",
      body:JSON.stringify({action:"batch",items:queue})
    })
    let j=await r.json()
    if(j.error) throw new Error(j.error)

    queue=[]
    localStorage.setItem("queue",JSON.stringify(queue))
    setStatus("online","Online")
  }catch{
    setStatus("offline","Retry later")
  }
}

/* UI (unchanged) */
function formatText(t,id){
  if(!t)return""
  let short=t.length>120
  return `<div><div class="def ${short?'clamp':''}" id="${id}">${t}</div>
  ${short?`<span class="link" onclick="toggleText('${id}',this)">Read more</span>`:""}</div>`
}
function toggleText(id,b){
  let el=document.getElementById(id)
  el.classList.toggle("clamp")
  b.innerText=el.classList.contains("clamp")?"Read more":"Show less"
}
function renderDefs(arr,w){
  function block(d,i){
    return `<div>${formatText(d.def,w+i)}${d.ex?`<div class="example">${d.ex}</div>`:""}</div>`
  }
  let first=block(arr[0],0)
  if(arr.length===1)return first

  let rest=arr.slice(1).map((d,i)=>block(d,i+1)).join("")
  return `${first}<div class="more" id="g${w}">${rest}</div>
  <span class="link" onclick="toggle('g${w}',this)">Show all +${arr.length-1}</span>`
}
function toggle(id,b){
  let el=document.getElementById(id)
  el.classList.toggle("open")
  b.innerText=el.classList.contains("open")?"Hide":"Show all"
}

/* RENDER */
function render(){
  let s=search.value.toLowerCase()
  let list=Object.keys(data).filter(w=>{
    return w.includes(s)||data[w].some(d=>d.def.toLowerCase().includes(s)||d.ex.toLowerCase().includes(s))
  }).reverse()

  count.innerText=list.length

  if(view==="table"){
    let h="<table><tr><th>Word</th><th>Details</th><th>Actions</th></tr>"
    list.forEach(w=>{
      h+=`<tr><td>${w}</td><td>${renderDefs(data[w],w)}</td>
      <td><div class="actions">
      <span onclick="speak('${w}')">🔊</span>
      <span onclick="editWord('${w}')">✏️</span>
      <span onclick="del('${w}')">❌</span>
      </div></td></tr>`
    })
    out.innerHTML=h+"</table>"
  }else{
    let h="<div class='cards'>"
    list.forEach(w=>{
      h+=`<div class="card"><div class="word">${w}</div>
      ${renderDefs(data[w],w)}
      <div class="actions">
      <span onclick="speak('${w}')">🔊</span>
      <span onclick="editWord('${w}')">✏️</span>
      <span onclick="del('${w}')">❌</span>
      </div></div>`
    })
    out.innerHTML=h+"</div>"
  }
}

/* ACTIONS */
function speak(w){speechSynthesis.speak(new SpeechSynthesisUtterance(w))}
function editWord(w){
  let oldDef=data[w][0].def
  let n=prompt("Edit",oldDef)
  if(n!==null){
    data[w][0].def=n
    localStorage.setItem("words",JSON.stringify(data))
    render()

    fetch(API,{
      method:"POST",
      body:JSON.stringify({
        action:"update",
        word:w,
        oldDefinition:oldDef,
        newDefinition:n
      })
    })
  }
}
function del(w){
  let def=data[w][0].def

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      word:w,
      definition:def
    })
  })

  delete data[w]
  localStorage.setItem("words",JSON.stringify(data))
  render()
}

search.oninput=()=>render()
function setView(v){
  view=v
  bt.classList.toggle("active",v==="table")
  bc.classList.toggle("active",v==="cards")
  render()
}
function clearAll(){input.value="";chat.value=""}

window.addEventListener("online",load)
window.addEventListener("offline",()=>setStatus("offline","Offline"))

load()

window.addEventListener("load",()=>{
  setTimeout(()=>{
    if(status.innerText==="Starting...") setStatus("online","Online")
  },1500)
})
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Words Tool 🚀</title>

<style>
body{margin:0;background:#0b1220;color:#fff;font-family:Arial}
h2{color:#38bdf8;margin:10px}

.container{display:flex;gap:10px;padding:10px}
.left{flex:3}
.right{flex:1;background:#1e293b;padding:10px;border-radius:10px}
@media(max-width:768px){.container{flex-direction:column}}

textarea,input{
width:100%;padding:10px;margin:6px 0;
border:none;border-radius:8px;
background:#1e293b;color:#fff
}

button{
width:100%;padding:10px;margin:6px 0;
border:none;border-radius:8px;
background:#38bdf8;color:#000;font-weight:bold
}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #334155;padding:8px}
th{background:#1e293b;color:#38bdf8}

td:nth-child(3),td:nth-child(4){
max-width:350px;
vertical-align:top;
}

/* ACTIONS */
.actions{
display:flex;
gap:6px;
justify-content:center;
}

.action-btn{
background:#38bdf8;
padding:4px 6px;
border-radius:6px;
cursor:pointer;
color:#000;
}

/* READ MORE */
.clamp{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.read-more{
color:#38bdf8;
cursor:pointer;
font-size:12px;
display:block;
margin-top:4px;
}

/* COLLAPSE */
.toggle-more{
color:#38bdf8;
cursor:pointer;
font-size:12px;
margin-top:4px;
display:block;
}

/* CARDS */
.cards{display:none}

.card{
background:#1e293b;
margin:10px;
padding:15px;
border-radius:10px;
}

.card .word{
color:#38bdf8;
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

/* MOBILE */
@media(max-width:768px){
.table-wrap{display:none}
.cards{display:block}
}
</style>
</head>

<body>

<h2>Words Tool 🚀</h2>

<div class="container">
<div class="left">
<textarea id="input" placeholder="Words"></textarea>
<textarea id="chat" placeholder="definition -- example"></textarea>
</div>

<div class="right">
<button onclick="generate()">Generate Prompt</button>
<button onclick="save()">Save</button>
<button onclick="clearAll()">Clear</button>
</div>
</div>

<div style="padding:10px">
<input id="search" placeholder="Search..." oninput="render()">
<div id="out"></div>
</div>

<script>

const API="PUT_YOUR_API_HERE";
let data={}

/* LOAD */
async function load(){
let saved=localStorage.getItem("wordsData")
if(saved){
data=JSON.parse(saved)
}

try{
let r=await fetch(API+"?action=getAll")
let j=await r.json()

let newData={}

j.data.forEach(i=>{
let w=i.word.toLowerCase()
if(!newData[w]) newData[w]=[]

let exists=newData[w].some(d=>d.def===i.definition && d.ex===i.example)

if(!exists){
newData[w].push({def:i.definition,ex:i.example||""})
}
})

data=newData
localStorage.setItem("wordsData",JSON.stringify(data))

}catch{}

render()
}

/* PARSE */
function parseLine(text){
if(text.includes("--")){
let p=text.split("--")
return {def:p[0].trim(),ex:p.slice(1).join("--").trim()}
}
return {def:text,ex:""}
}

/* SAVE */
async function save(){
let words=input.value.split("\n").filter(Boolean)
let lines=chat.value.split("\n").filter(Boolean)

for(let i=0;i<words.length;i++){
let w=words[i].toLowerCase()
let p=parseLine(lines[i]||"")

if(!data[w]) data[w]=[]

let exists=data[w].some(d=>d.def===p.def && d.ex===p.ex)

if(!exists){
data[w].push(p)
localStorage.setItem("wordsData",JSON.stringify(data))

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"save",
word:w,
definition:p.def,
example:p.ex
})
})
}
}

render()
}

/* READ MORE */
function formatText(text){
if(!text) return ""
if(text.length<120) return text

let id="t"+Math.random()

return `
<div>
<div class="clamp" id="${id}">${text}</div>
<span class="read-more" onclick="
document.getElementById('${id}').style.webkitLineClamp='unset';
this.remove();
">Read more</span>
</div>`
}

/* COLLAPSE */
function renderDefs(defs){
let arr = Array.isArray(defs)?defs:[defs]

let first = `<div>${formatText(arr[0].def)}</div>`

if(arr.length===1) return first

let rest = arr.slice(1).map(d=>`<div>${formatText(d.def)}</div>`).join("")
let id="d"+Math.random()

return `
<div>
${first}
<div id="${id}" style="display:none">${rest}</div>
<span class="toggle-more" onclick="
let el=document.getElementById('${id}')
if(el.style.display==='none'){
el.style.display='block'
this.innerText='Hide'
}else{
el.style.display='none'
this.innerText='Show all'
}
">Show all (${arr.length})</span>
</div>`
}

/* RENDER */
function render(){

let s=search.value.toLowerCase()
let list=Object.keys(data).filter(w=>w.includes(s)).reverse()

let table="<div class='table-wrap'><table>"
table+="<tr><th>#</th><th>Word</th><th>Definition</th><th>Example</th><th>Action</th></tr>"

let cards="<div class='cards'>"

let i=list.length

list.forEach(w=>{
let defs = Array.isArray(data[w])?data[w]:[data[w]]

let defHTML = renderDefs(defs)
let exHTML = defs.map(d=>`<div style="color:#facc15">${formatText(d.ex)}</div>`).join("")

table+=`
<tr>
<td>${i}</td>
<td>${w}</td>
<td>${defHTML}</td>
<td>${exHTML}</td>
<td class="actions">
<span class="action-btn">🔊</span>
<span class="action-btn">✏️</span>
<span class="action-btn">❌</span>
</td>
</tr>
`

cards+=`
<div class="card">
<div class="word">${w}</div>
<div>${defHTML}</div>
<div style="color:#facc15">${exHTML}</div>
</div>
`

i--
})

table+="</table></div>"
cards+="</div>"

out.innerHTML = table + cards
}

function clearAll(){
input.value=""
chat.value=""
}

function generate(){
window.open("https://chat.openai.com","_blank")
}

load()

</script>

</body>
</html>

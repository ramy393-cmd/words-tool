<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Words Tool</title>

<style>
:root{
--bg:#060c18;--card:#0f1a2e;--border:#1e2d45;
--accent:#38bdf8;--text:#e2e8f0;--muted:#64748b;--gold:#facc15;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui}

/* header */
.header{display:flex;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border);background:#0a1324}
.status{padding:4px 10px;border-radius:999px;font-size:12px}
.online{background:#064e3b;color:#34d399}
.syncing{background:#422006;color:#facc15}
.local{background:#450a0a;color:#f87171}

/* layout */
.container{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 50px)}
@media(max-width:900px){.container{grid-template-columns:1fr}}

.sidebar{padding:16px;background:#0a1324;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
textarea,input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:white}
button{padding:10px;border-radius:8px;border:none;cursor:pointer}
.btn-primary{background:var(--accent);color:black}
.btn-secondary{background:#0ea5e9;color:#000}

.main{display:flex;flex-direction:column}
.toolbar{display:flex;gap:10px;padding:10px;border-bottom:1px solid var(--border)}
.toolbar input{flex:1}

.content{overflow:auto;padding:10px}

table{width:100%}
td{padding:10px;border-bottom:1px solid var(--border)}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:900px){.cards{grid-template-columns:1fr}}

.card{background:var(--card);padding:10px;border-radius:8px}

.word{color:var(--accent);font-weight:bold}
.example{color:var(--gold);font-style:italic;margin-top:4px}
.link{color:var(--accent);cursor:pointer;font-size:12px}
.clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.more{display:none}
.more.open{display:block}

.actions{display:flex;gap:10px}
</style>

</head>

<body>

<div class="header">
<div>Words Tool</div>
<div>
<span id="status" class="status syncing">Starting...</span>
Words: <span id="count">0</span>
</div>
</div>

<div class="container">

<div class="sidebar">
<textarea id="input" placeholder="Words"></textarea>
<textarea id="chat" placeholder="definition | example"></textarea>
<button class="btn-primary" onclick="save()">Save</button>
<button class="btn-secondary" onclick="generate()">AI Prompt</button>
</div>

<div class="main">
<div class="toolbar">
<input id="search" placeholder="Search...">
<button onclick="view='table';render()">Table</button>
<button onclick="view='cards';render()">Cards</button>
</div>
<div id="out" class="content"></div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzBxSmtkwsvkhQ-n7YgJVHEVGxwnnu6bcT0sZxGh7zb_4Q9j4j_tPTGJaZSriX5gb4K/exec";

let data={}
let view="table"

function setStatus(c,t){
status.className="status "+c
status.innerText=t
}

function parse(t){
if(t.includes("|")){let[d,e]=t.split("|");return{def:d.trim(),ex:e||""}}
if(t.includes("--")){let[d,e]=t.split("--");return{def:d.trim(),ex:e||""}}
return{def:t,ex:""}
}

function save(){
let w=input.value.split("\n")
let l=chat.value.split("\n")

w.forEach((word,i)=>{
word=word.trim().toLowerCase()
if(!word)return
let p=parse(l[i]||"")
if(!data[word])data[word]=[]
if(!data[word].some(d=>d.def===p.def)){
data[word].push(p)
}
})

localStorage.setItem("words",JSON.stringify(data))
render()
}

function formatText(text,id){
if(text.length<80)return text
return `<div id="${id}" class="clamp">${text}</div>
<span class="link" onclick="toggleText('${id}',this)">Read more</span>`
}

function toggleText(id,btn){
let el=document.getElementById(id)
el.classList.toggle("clamp")
btn.innerText=el.classList.contains("clamp")?"Read more":"Show less"
}

function renderDefs(arr,word){
let first=arr[0]
let html=formatText(first.def,word+"0")
if(first.ex)html+=`<div class="example">${first.ex}</div>`

if(arr.length>1){
let rest=arr.slice(1).map((d,i)=>formatText(d.def,word+i+1)).join("")
html+=`<div id="g${word}" class="more">${rest}</div>
<span class="link" onclick="toggle('g${word}',this)">Show all +${arr.length-1}</span>`
}

return html
}

function toggle(id,btn){
let el=document.getElementById(id)
el.classList.toggle("open")
btn.innerText=el.classList.contains("open")?"Hide":"Show all"
}

function render(){
let list=Object.keys(data).filter(w=>{
let s=search.value.toLowerCase()
return w.includes(s)||data[w].some(d=>d.def.includes(s)||d.ex.includes(s))
})

count.innerText=list.length

if(view==="table"){
let html="<table>"
list.forEach(w=>{
html+=`<tr>
<td>${w}</td>
<td>${renderDefs(data[w],w)}</td>
<td class="actions">
<span onclick="speechSynthesis.speak(new SpeechSynthesisUtterance('${w}'))">🔊</span>
<span onclick="editWord('${w}')">✏️</span>
<span onclick="del('${w}')">❌</span>
</td>
</tr>`
})
html+="</table>"
out.innerHTML=html
}else{
let html="<div class='cards'>"
list.forEach(w=>{
html+=`<div class="card">
<div class="word">${w}</div>
${renderDefs(data[w],w)}
</div>`
})
html+="</div>"
out.innerHTML=html
}
}

function editWord(w){
let n=prompt("Edit",data[w][0].def)
if(n){data[w][0].def=n;render()}
}

function del(w){
delete data[w]
render()
}

search.oninput=()=>render()

window.onload=()=>{
let saved=localStorage.getItem("words")
if(saved)data=JSON.parse(saved)
setStatus("online","Online")
render()
}
</script>

</body>
</html>

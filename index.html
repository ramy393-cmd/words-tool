<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Words Tool</title>

<style>
:root{
--bg:#060c18; --card:#0f1a2e; --border:#1e2d45;
--accent:#38bdf8; --text:#e2e8f0; --muted:#64748b; --gold:#facc15;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);background:#0a1324}
.logo{color:var(--accent);font-weight:700}
.header-right{display:flex;align-items:center;gap:10px}
.status{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.online{background:#064e3b;color:#34d399}
.offline{background:#450a0a;color:#f87171}
.syncing{background:#422006;color:#facc15}
.local{background:#422006;color:#facc15}

/* LAYOUT */
.container{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 50px)}
@media(max-width:900px){.container{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{padding:16px;background:#0a1324;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
textarea,input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:white}
button{padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:600}
.btn-primary{background:var(--accent);color:black}
.btn-secondary{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#000}
.btn-danger{border:1px solid var(--border);color:var(--muted)}

/* MAIN */
.main{display:flex;flex-direction:column}
.toolbar{display:flex;gap:10px;padding:12px;border-bottom:1px solid var(--border);background:#0a1324;flex-wrap:wrap}
.toolbar input{flex:1}
.view-btn{padding:8px 12px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer}
.view-btn.active{background:var(--accent);color:black}

/* CONTENT */
.content{overflow:auto;padding:14px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top}
th{color:var(--muted);font-size:12px}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.cards{grid-template-columns:1fr}}

.card{background:var(--card);padding:12px;border-radius:10px;border:1px solid var(--border);display:flex;flex-direction:column;gap:8px}

/* TEXT */
.word{color:var(--accent);font-weight:700;font-size:15px}
.def{font-size:14px;line-height:1.6}
.clamp{display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
.link{color:var(--accent);font-size:12px;cursor:pointer;margin-top:3px}
.example{color:var(--gold);font-size:13px;font-style:italic;margin-top:4px}

/* COLLAPSE */
.more{display:none}
.more.open{display:block}

/* ACTIONS */
.actions{display:flex;gap:10px;margin-top:6px}
.action{cursor:pointer;font-size:15px}
</style>

</head>

<body>

<div class="header">
  <div class="logo">Words Tool</div>
  <div class="header-right">
    <div id="status" class="status syncing">Starting...</div>
    <div>Words: <span id="count">0</span></div>
  </div>
</div>

<div class="container">

  <div class="sidebar">
    <textarea id="input" placeholder="Words"></textarea>
    <textarea id="chat" placeholder="definition | example"></textarea>
    <button class="btn-primary" onclick="save()">Save</button>
    <button class="btn-secondary" onclick="generate()">AI Prompt</button>
    <button class="btn-danger" onclick="clearAll()">Clear</button>
  </div>

  <div class="main">
    <div class="toolbar">
      <input id="search" placeholder="Search...">
      <button class="view-btn active" id="bt" onclick="setView('table')">Table</button>
      <button class="view-btn" id="bc" onclick="setView('cards')">Cards</button>
    </div>
    <div class="content" id="out"></div>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyDiJ2mRyFAlkzGEPAUROtvMXs27mCSJvT3m-Z-3tgHpmKUa-PpstZkk4Do6qdvQds/exec";

let data = {};
let queue = JSON.parse(localStorage.getItem("queue") || "[]");
let synced = JSON.parse(localStorage.getItem("synced") || "[]");
let view = "table";
let retryTimer = null;
let chatTab = null;

const $ = id => document.getElementById(id);

function escapeHTML(s){return (s||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function safeId(s){return "id_"+encodeURIComponent(s).replace(/%/g,'')}
function getClampLines(){return window.innerWidth<500?3:2}
function setStatus(t,txt){$("status").className="status "+t;$("status").textContent=txt}
function startRetry(){if(retryTimer)return;retryTimer=setInterval(load,5000)}

function parse(t){
if(!t)return{def:"",ex:""}
if(t.includes("|")){let[d,...r]=t.split("|");return{def:d.trim(),ex:r.join("|").trim()}}
if(t.includes("--")){let[d,...r]=t.split("--");return{def:d.trim(),ex:r.join("--").trim()}}
return{def:t.trim(),ex:""}
}

async function save(){
setStatus("syncing","Syncing...")
let w=$("input").value.split("\n").filter(Boolean)
let l=$("chat").value.split("\n").filter(Boolean)
let batch=[]

for(let i=0;i<w.length;i++){
let word=w[i].toLowerCase().trim()
if(!word)continue
let p=parse(l[i]||"")
if(!data[word])data[word]=[]
if(!data[word].some(d=>d.def===p.def&&d.ex===p.ex)){
data[word].push(p)
let item={word,definition:p.def,example:p.ex,id:word+"|"+p.def+"|"+p.ex}
if(!synced.includes(item.id))batch.push(item)
}
}

if(!batch.length){setStatus("online","Up to date");return}

try{
await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"batch",items:batch})})
synced=[...new Set([...synced,...batch.map(i=>i.id)])].slice(-5000)
localStorage.setItem("synced",JSON.stringify(synced))
setStatus("online","Online")
}catch{
queue.push(...batch)
localStorage.setItem("queue",JSON.stringify(queue))
setStatus("local","Saved locally")
}

localStorage.setItem("words",JSON.stringify(data))
render()
}

function formatText(text,id){
if(!text)return""
let short=text.length>100
return`<div><div class="def ${short?'clamp':''}" style="-webkit-line-clamp:${getClampLines()}" id="${id}">${escapeHTML(text)}</div>${short?`<span class="link" onclick="toggleText('${id}',this)">Read more</span>`:""}</div>`
}

function toggleText(id,btn){
let el=document.getElementById(id)
el.classList.toggle("clamp")
btn.innerText=el.classList.contains("clamp")?"Read more":"Show less"
}

function renderDefs(arr,word){
if(!Array.isArray(arr))arr=[arr]
let first=formatText(arr[0].def,safeId(word+"0"))
if(arr.length===1)return first
let rest=arr.slice(1).map((d,i)=>formatText(d.def,safeId(word+i+1))).join("")
let id=safeId("g"+word)
return`${first}<div class="more" id="${id}">${rest}</div><span class="link" onclick="toggle('${id}',this)">Show all +${arr.length-1}</span>`
}

function toggle(id,btn){
let el=document.getElementById(id)
el.classList.toggle("open")
btn.innerText=el.classList.contains("open")?"Hide":"Show all"
}

async function load(){
let saved=localStorage.getItem("words")
if(saved)data=JSON.parse(saved)

setStatus("syncing","Syncing...")

try{
let r=await fetch(API+"?action=getAll",{cache:"no-store"})
let j=await r.json()
if(j.data){
j.data.forEach(i=>{
let w=i.word.toLowerCase()
if(!data[w])data[w]=[]
let obj={def:i.definition,ex:i.example}
if(!data[w].some(d=>d.def===obj.def&&d.ex===obj.ex)){
data[w].push(obj)
}
})
}
setStatus("online","Online")
await syncQueue()
setStatus("online","Online")
}catch{
setStatus("local","API Error")
startRetry()
}

render()
}

async function syncQueue(){
if(!queue.length)return
setStatus("syncing","Syncing...")
let newQ=[]
for(let item of queue){
try{
await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(item)})
}catch{newQ.push(item)}
}
queue=newQ
localStorage.setItem("queue",JSON.stringify(queue))
if(queue.length)setStatus("syncing","Retrying...")
else setStatus("online","Online")
}

function render(){
let list=Object.keys(data)
$("count").innerText=list.length
let html="<table><tr><th>Word</th><th>Details</th><th>Actions</th></tr>"
list.forEach(w=>{
html+=`<tr><td>${w}</td><td>${renderDefs(data[w],w)}</td><td><span onclick="del('${w}')">❌</span></td></tr>`
})
$("out").innerHTML=html
}

function del(w){
delete data[w]
localStorage.setItem("words",JSON.stringify(data))
render()
}

window.addEventListener("online",load)
window.addEventListener("offline",()=>setStatus("offline","Offline"))

load()

// ✅ الحل النهائي
window.addEventListener("load", ()=>{
setTimeout(()=>setStatus("online","Online"),1500)
})
</script>

</body>
</html>

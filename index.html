<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.json">
<title>Words Tool 🚀</title>

<style>
body{margin:0;background:#0b1220;color:#fff;font-family:Arial}
h2{color:#38bdf8;margin:10px}

.container{display:flex;gap:10px;padding:10px}
.left{flex:3}
.right{flex:1;background:#1e293b;padding:10px;border-radius:10px}
@media(max-width:768px){.container{flex-direction:column}}

textarea,input{
width:100%;padding:10px;margin:6px 0;
border:none;border-radius:8px;
background:#1e293b;color:#fff
}

button{
width:100%;padding:10px;margin:6px 0;
border:none;border-radius:8px;
background:#38bdf8;color:#000;font-weight:bold
}

.status{
display:flex;align-items:center;gap:6px;
background:#0f172a;padding:8px;border-radius:6px;margin-bottom:10px
}

.dot{width:10px;height:10px;border-radius:50%;background:gray}
.green{background:#22c55e}.yellow{background:#facc15}.red{background:#ef4444}

.toggle{display:flex;gap:10px;padding:10px}
.toggle button{flex:1}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #334155;padding:8px}
th{background:#1e293b;color:#38bdf8}

/* prevent breaking */
td:nth-child(1), td:nth-child(2){
white-space:nowrap;
}

/* text wrap only for content */
td:nth-child(3), td:nth-child(4){
word-break:break-word;
}

/* actions */
.actions{
display:flex;
gap:6px;
justify-content:center;
flex-wrap:nowrap;
}

.action-btn{
padding:4px 6px;
border-radius:6px;
background:#38bdf8;
color:#000;
cursor:pointer
}

/* read more */
.clamp{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.read-more{
color:#38bdf8;
cursor:pointer;
font-size:12px;
}

/* cards */
.flashcard{
background:#1e293b;padding:15px;margin:10px;border-radius:12px
}

.flashcard .word{color:#38bdf8;font-weight:bold;font-size:18px}
.flashcard .def{margin-top:10px;font-size:14px}

.flashcard .actions{
display:flex;
gap:6px;
margin-top:10px
}

.flashcard .actions button{
width:32px;height:32px;padding:0
}

@media(max-width:768px){
.table-wrap{display:none}
}
</style>
</head>

<body>

<h2>Words Tool 🚀</h2>

<div class="container">
<div class="left">
<textarea id="input" placeholder="Words"></textarea>
<textarea id="chat" placeholder="definition -- example OR --example"></textarea>
</div>

<div class="right">
<div class="status">
<span id="dot" class="dot"></span>
<span id="statusText">Ready</span>
</div>

<button onclick="generate()">Generate Prompt</button>
<button onclick="save()">Save</button>
<button onclick="clearAll()">Clear</button>
<button id="installBtn" style="display:none">Install App</button>
</div>
</div>

<div class="toggle">
<button onclick="setView('table')">Table</button>
<button onclick="setView('cards')">Cards</button>
</div>

<div style="padding:10px">
<input id="search" placeholder="Search..." oninput="render()">
<div id="out"></div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwQHi9XYwqzFbQHHfqCf8rv2aeCdQ6ejK3w93zdCPJpHl46nl_CrQCRtZ60i0vk-3c/exec";

let data={}
let viewMode=window.innerWidth<768?"cards":"table"
let deferredPrompt;

/* STATUS */
function updateStatus(msg,type){
statusText.innerText=msg
dot.className="dot"
if(type==="success") dot.classList.add("green")
if(type==="pending") dot.classList.add("yellow")
if(type==="error") dot.classList.add("red")
}

/* LOAD + GROUP */
async function load(){
let saved=localStorage.getItem("wordsData")
if(saved){data=JSON.parse(saved);render();updateStatus("Loaded","success")}

try{
let r=await fetch(API+"?action=getAll")
let j=await r.json()

let newData={}

j.data.forEach(i=>{
let w=i.word.toLowerCase()
if(!newData[w]) newData[w]=[]

newData[w].push({
def:i.definition,
ex:i.example||""
})
})

data=newData
localStorage.setItem("wordsData",JSON.stringify(data))
render()
updateStatus("Synced","success")

}catch{
updateStatus("Offline","error")
}
}

/* PARSER */
function parseLine(text){
text=text.trim().replace(/\*\*/g,"")

if(text.startsWith("--")){
return {def:"",ex:text.replace(/^--+/,"").trim()}
}

if(text.includes("--")){
let p=text.split("--")
return {def:p[0].trim(),ex:p.slice(1).join("--").trim()}
}

if(text.includes("|")){
let p=text.split("|")
return {def:p[0].trim(),ex:p.slice(1).join("|").trim()}
}

return {def:text,ex:""}
}

/* SAVE (append) */
async function save(){

let words=input.value.split("\n").map(x=>x.trim()).filter(Boolean)
let lines=chat.value.split("\n").map(x=>x.trim()).filter(Boolean)

updateStatus("Saving...","pending")

for(let i=0;i<(words.length||lines.length);i++){

let word=(words[i]||lines[i].split(" ")[0]).toLowerCase()
let parsed=parseLine(lines[i]||"")

if(!data[word]) data[word]=[]

let exists=data[word].some(d=>d.def===parsed.def && d.ex===parsed.ex)

if(!exists){
data[word].push(parsed)
localStorage.setItem("wordsData",JSON.stringify(data))
await fetch(API,{method:"POST",body:JSON.stringify({
action:"save",word,definition:parsed.def,example:parsed.ex
})})
}
}

render()
updateStatus("Saved","success")
}

/* FORMAT TEXT */
function formatText(text){
if(!text) return ""
if(text.length<120) return text

let id=Math.random()
return `
<div class="clamp" id="t${id}">${text}</div>
<span class="read-more" onclick="document.getElementById('t${id}').style.webkitLineClamp='unset'; this.remove()">Read more</span>
`
}

/* RENDER */
function render(){
let s=search.value.toLowerCase()

let list=Object.keys(data).filter(w=>
w.includes(s) || data[w].some(d=>d.def.includes(s)||d.ex.includes(s))
).reverse()

let html="",i=list.length

if(viewMode==="table"){
html=`<div class="table-wrap"><table>
<tr><th>#</th><th>Word</th><th>Definition</th><th>Example</th><th>Action</th></tr>`

list.forEach(w=>{
let defs=data[w]

let defHTML=defs.map((d,i)=>`<div><b>${i+1}.</b> ${formatText(d.def)}</div>`).join("")
let exHTML=defs.map(d=>`<div style="color:#facc15">${formatText(d.ex)}</div>`).join("")

html+=`<tr>
<td>${i}</td>
<td>${w}</td>
<td>${defHTML}</td>
<td>${exHTML}</td>
<td class="actions">
<span class="action-btn" onclick="speak('${w}')">🔊</span>
<span class="action-btn" onclick="editWord('${w}')">✏️</span>
<span class="action-btn" onclick="deleteWord('${w}')">❌</span>
</td>
</tr>`
i--
})

html+="</table></div>"

}else{

list.forEach(w=>{
let defs=data[w]

let block=defs.map((d,i)=>`
<div style="margin-bottom:8px">
<b>${i+1}.</b> ${formatText(d.def)}<br>
<span style="color:#facc15">${formatText(d.ex)}</span>
</div>`).join("")

html+=`<div class="flashcard">
<div class="word">${i}. ${w}</div>
<div class="def">${block}
<div class="actions">
<button onclick="speak('${w}')">🔊</button>
<button onclick="editWord('${w}')">✏️</button>
<button onclick="deleteWord('${w}')">❌</button>
</div></div></div>`
i--
})

}

out.innerHTML=html
}

/* HELPERS */
function speak(w){speechSynthesis.speak(new SpeechSynthesisUtterance(w))}
function editWord(w){let d=data[w][0];chat.value=`${w}: ${d.def} -- ${d.ex}`}
function deleteWord(w){
if(!confirm("Delete all definitions?")) return
delete data[w]
localStorage.setItem("wordsData",JSON.stringify(data))
fetch(API,{method:"POST",body:JSON.stringify({action:"delete",word:w})})
render()
}

function clearAll(){input.value="";chat.value="";updateStatus("Ready")}
function setView(v){viewMode=v;render()}

/* PROMPT */
function generate(){
let words=input.value.trim()
navigator.clipboard.writeText(`For each term return:
definition -- example

Rules:
- Do NOT repeat the word
- No formatting`)
window.open("https://chat.openai.com","_blank")
}

/* INIT */
load()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>

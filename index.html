<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Words Tool</title>

<style>
body{
  background:#060c18;
  color:#fff;
  font-family:sans-serif;
  margin:0;
}

.container{
  display:flex;
  height:100vh;
}

.sidebar{
  width:280px;
  padding:12px;
  background:#0a1324;
}

textarea,input{
  width:100%;
  margin-bottom:8px;
  padding:10px;
  background:#111;
  color:#fff;
  border:1px solid #333;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin-bottom:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:first-of-type{background:#38bdf8;color:#000;}
button:last-of-type{background:#444;color:#fff;}

.main{
  flex:1;
  padding:12px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.status{
  padding:5px 12px;
  border-radius:20px;
  font-size:13px;
}

.online{background:#064e3b}
.offline{background:#450a0a}
.syncing{background:#422006}
.pending{background:#422006}

.word{
  color:#38bdf8;
  font-weight:bold;
}

.example{
  color:#facc15;
  font-size:12px;
  margin-top:4px;
}

table{
  width:100%;
  table-layout:fixed;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:left;
  vertical-align:top;
}

td{
  word-break:break-word;
}

.def-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:6px 0;
  border-bottom:1px solid #1e2d45;
}

.def-text{
  flex:1;
}

.actions{
  display:flex;
  gap:10px;
  flex-shrink:0;
}

.actions span{
  cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<textarea id="input" placeholder="Words (one per line)"></textarea>
<textarea id="chat" placeholder="definition | example"></textarea>

<button onclick="save()">Save</button>
<button onclick="clearAll()">Clear</button>
</div>

<div class="main">

<div class="topbar">
<div>
<span id="status" class="status syncing">Starting...</span>
<span id="count"></span>
</div>
</div>

<input id="search" oninput="render()" placeholder="Search...">

<div id="out"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxn6Y2FceyY3tg2v4kOvzI0Ghu5Pi6ulqhXi3Rl7G3LVf50mSjtcIa5ZlUx45RzbfyP/exec";

const statusEl=document.getElementById("status")

let data={}

/* STATUS */
function setStatus(type,text){
  statusEl.className="status "+type
  statusEl.innerText=text
}

/* SPEAK US */
function speak(word){
  let u=new SpeechSynthesisUtterance(word)
  u.lang="en-US"
  speechSynthesis.speak(u)
}

/* ESCAPE */
function esc(t){
  return t.replace(/'/g,"\\'")
}

/* SAVE */
async function save(){

setStatus("syncing","Saving...")

let words=input.value.split("\n")
let defs=chat.value.split("\n")

let items=[]

words.forEach((w,i)=>{

let word=w.trim().toLowerCase()
if(!word) return

let parts=(defs[i]||"").split("|")
let def=parts[0]?.trim()||""
let ex=parts[1]?.trim()||""

if(!data[word]) data[word]=[]

if(!data[word].some(d=>d.def===def && d.ex===ex)){

let obj={def,ex,createdAt:Date.now()}
data[word].push(obj)

items.push({
word,
definition:def,
example:ex
})

}

})

render()

try{

await fetch(API,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
action:"batch",
items
})
})

setStatus("online","Online")

}catch{

setStatus("offline","Offline")

}

}

/* LOAD */
async function load(){

setStatus("syncing","Syncing...")

try{

let r=await fetch(API+"?action=getAll")
let j=await r.json()

data={}

j.data.forEach(i=>{

let word=i.word.toLowerCase()

if(!data[word]) data[word]=[]

let obj={
def:i.definition,
ex:i.example,
createdAt:Date.now()
}

if(!data[word].some(d=>d.def===obj.def && d.ex===obj.ex)){
data[word].push(obj)
}

})

setStatus("online","Online")

}catch{

setStatus("offline","Offline")

}

render()

}

/* DELETE */
async function del(word,def){

data[word]=data[word].filter(d=>d.def!==def)

render()

try{

await fetch(API,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
action:"delete",
word,
definition:def
})
})

}catch{}

}

/* EDIT */
async function edit(word,oldDef){

let newDef=prompt("Edit",oldDef)
if(!newDef) return

data[word].forEach(d=>{
if(d.def===oldDef) d.def=newDef
})

render()

try{

await fetch(API,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
action:"update",
word,
oldDefinition:oldDef,
newDefinition:newDef
})
})

}catch{}

}

/* RENDER */
function render(){

let s=search.value.toLowerCase()

let words=Object.keys(data).sort((a,b)=>{

let ta=Math.max(...data[a].map(x=>x.createdAt))
let tb=Math.max(...data[b].map(x=>x.createdAt))

return tb-ta

})

words=words.filter(w=>w.includes(s))

count.innerText=words.length

out.innerHTML=`
<table>
<tr>
<th style="width:20%">Word</th>
<th style="width:80%">Details</th>
</tr>

${words.map(w=>{

let defs=data[w].map(d=>`
<div class="def-row">

<div class="def-text">
${d.def}
${d.ex?`<div class="example">${d.ex}</div>`:""}
</div>

<div class="actions">
<span onclick="speak('${esc(w)}')">🔊</span>
<span onclick="edit('${esc(w)}','${esc(d.def)}')">✏️</span>
<span onclick="del('${esc(w)}','${esc(d.def)}')">❌</span>
</div>

</div>
`).join("")

return `<tr>
<td class="word">${w}</td>
<td>${defs}</td>
</tr>`

}).join("")}

</table>
`
}

function clearAll(){
input.value=""
chat.value=""
}

/* INIT */
load()

</script>

</body>
</html>

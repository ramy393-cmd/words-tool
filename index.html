<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Words Tool</title>

<style>
:root{
--bg:#060c18;--card:#0f1a2e;--border:#1e2d45;
--accent:#38bdf8;--text:#e2e8f0;--muted:#64748b;--gold:#facc15;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui}

.header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);background:#0a1324}
.logo{color:var(--accent);font-weight:700}
.header-right{display:flex;gap:10px;align-items:center}

.status{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.online{background:#064e3b;color:#34d399}
.offline{background:#450a0a;color:#f87171}
.syncing{background:#422006;color:#facc15}
.local{background:#422006;color:#facc15}

.container{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 50px)}
.sidebar{padding:16px;background:#0a1324;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:10px}

textarea,input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:white}

button{padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:600}
.btn-primary{background:var(--accent);color:black}
.btn-secondary{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#000}
.btn-danger{border:1px solid var(--border);color:var(--muted)}

.main{display:flex;flex-direction:column}
.toolbar{display:flex;gap:10px;padding:12px;border-bottom:1px solid var(--border);background:#0a1324}

.view-btn{padding:8px 12px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:6px}
.view-btn.active{background:var(--accent);color:black}

.content{overflow:auto;padding:14px}

table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.card{background:var(--card);padding:12px;border-radius:10px;border:1px solid var(--border)}

.word{
color:var(--accent);
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.example{color:var(--gold);margin-top:4px}

.actions{display:flex;gap:10px}
.action{cursor:pointer;flex-shrink:0}

.more{color:#38bdf8;cursor:pointer;font-size:12px}
</style>

</head>

<body>

<div class="header">
<div class="logo">Words Tool</div>
<div class="header-right">
<div id="status" class="status syncing">Starting...</div>
<div>Words: <span id="count">0</span></div>
</div>
</div>

<div class="container">

<div class="sidebar">
<textarea id="input" placeholder="Words"></textarea>
<textarea id="chat" placeholder="definition | example"></textarea>
<button class="btn-primary" onclick="save()">Save</button>
<button class="btn-secondary" onclick="generate()">AI Prompt</button>
<button class="btn-danger" onclick="clearAll()">Clear</button>
</div>

<div class="main">
<div class="toolbar">
<input id="search" placeholder="Search...">
<button class="view-btn active" onclick="setView('table')" id="bt">Table</button>
<button class="view-btn" onclick="setView('cards')" id="bc">Cards</button>
</div>

<div class="content" id="out"></div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxn6Y2FceyY3tg2v4kOvzI0Ghu5Pi6ulqhXi3Rl7G3LVf50mSjtcIa5ZlUx45RzbfyP/exec";

let data=JSON.parse(localStorage.getItem("words")||"{}");
let queue=JSON.parse(localStorage.getItem("queue")||"[]");
let view="table";

/* STATUS */
function setStatus(t,x){
status.className="status "+t;
status.innerText=x;
}

/* RETRY QUEUE */
setInterval(syncQueue,5000);

async function syncQueue(){
if(!queue.length)return;

setStatus("syncing","Syncing...")

let newQueue=[];

for(let item of queue){
try{
await fetch(API,{
method:"POST",
body:JSON.stringify(item)
})
}catch{
newQueue.push(item)
}
}

queue=newQueue;
localStorage.setItem("queue",JSON.stringify(queue));

if(queue.length===0){
setStatus("online","Online")
}else{
setStatus("local","Pending")
}
}

/* SPEAK */
function speak(w){
let u=new SpeechSynthesisUtterance(w);
u.lang="en-US";
speechSynthesis.speak(u);
}

/* PARSE */
function parse(t){
if(!t)return{def:"",ex:""}
let p=t.split("|");
return{def:p[0]?.trim()||"",ex:p[1]?.trim()||""}
}

/* SAVE */
async function save(){
setStatus("syncing","Saving...")

let words=input.value.split("\n").map(x=>x.trim()).filter(Boolean)
let defs=chat.value.split("\n")

let items=[]

words.forEach((w,i)=>{
let word=w.toLowerCase()
let p=parse(defs[i]||"")

if(!data[word])data[word]=[]

if(!data[word].some(d=>d.def===p.def&&d.ex===p.ex)){
data[word].push({...p,open:false})
items.push({action:"batch",items:[{word,definition:p.def,example:p.ex}]})
}
})

localStorage.setItem("words",JSON.stringify(data))
render()

try{
await fetch(API,{
method:"POST",
body:JSON.stringify({action:"batch",items:items.map(i=>i.items[0])})
})
setStatus("online","Online")
}catch{
queue.push(...items)
localStorage.setItem("queue",JSON.stringify(queue))
setStatus("local","Saved locally")
}
}

/* DELETE */
async function del(w){
let defs=data[w]||[]

delete data[w]
localStorage.setItem("words",JSON.stringify(data))
render()

for(let d of defs){
let item={action:"delete",word:w,definition:d.def}
try{
await fetch(API,{method:"POST",body:JSON.stringify(item)})
}catch{
queue.push(item)
}
}

localStorage.setItem("queue",JSON.stringify(queue))
}

/* EDIT */
async function edit(w){
let oldDef=data[w][0].def
let newDef=prompt("Edit",oldDef)
if(!newDef)return

data[w][0].def=newDef
localStorage.setItem("words",JSON.stringify(data))
render()

let item={action:"update",word:w,oldDefinition:oldDef,newDefinition:newDef}

try{
await fetch(API,{method:"POST",body:JSON.stringify(item)})
}catch{
queue.push(item)
}
}

/* LOAD */
async function load(){
setStatus("syncing","Syncing...")

try{
let r=await fetch(API+"?action=getAll",{cache:"no-store"})
let j=await r.json()

j.data?.forEach(i=>{
let w=i.word.toLowerCase()
if(!data[w])data[w]=[]

let obj={def:i.definition||"",ex:i.example||"",open:false}

if(!data[w].some(d=>d.def===obj.def&&d.ex===obj.ex)){
data[w].push(obj)
}
})

setStatus("online","Online")

}catch{
setStatus("offline","Offline")
}

render()
}

/* TOGGLE READ MORE */
function toggle(w,i){
data[w][i].open=!data[w][i].open
render()
}

/* RENDER */
function render(){
let s=search.value.toLowerCase()

let list=Object.keys(data).filter(w=>{
return w.includes(s)||data[w].some(d=>d.def.toLowerCase().includes(s)||d.ex.toLowerCase().includes(s))
}).reverse()

count.innerText=list.length

function format(d,w,i){
let short=d.def.length>80 && !d.open
return `
<div>
${short ? d.def.slice(0,80)+"..." : d.def}
${d.def.length>80 ? `<div class="more" onclick="toggle('${w}',${i})">${d.open?"Collapse":"Read more"}</div>`:""}
${d.ex?`<div class="example">${d.ex}</div>`:""}
</div>`
}

if(view==="table"){
out.innerHTML=`<table>
<tr><th>Word</th><th>Details</th><th>Actions</th></tr>
${list.map(w=>`
<tr>
<td class="word">${w}</td>
<td>${data[w].map((d,i)=>format(d,w,i)).join("")}</td>
<td>
<div class="actions">
<span onclick="speak('${w}')">🔊</span>
<span onclick="edit('${w}')">✏️</span>
<span onclick="del('${w}')">❌</span>
</div>
</td>
</tr>`).join("")}
</table>`
}else{
out.innerHTML=`<div class="cards">
${list.map(w=>`
<div class="card">
<div class="word">${w}</div>
${data[w].map((d,i)=>format(d,w,i)).join("")}
<div class="actions">
<span onclick="speak('${w}')">🔊</span>
<span onclick="edit('${w}')">✏️</span>
<span onclick="del('${w}')">❌</span>
</div>
</div>`).join("")}
</div>`
}
}

function generate(){
navigator.clipboard.writeText("Use this in ChatGPT")
}

function setView(v){
view=v
bt.classList.toggle("active",v==="table")
bc.classList.toggle("active",v==="cards")
render()
}

function clearAll(){
input.value=""
chat.value=""
}

search.oninput=render

load()

</script>

</body>
</html>
